<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Outputs</title>
  <style>
    body {
      background: #020617;
      color: #e5e7eb;
      font-family: Arial, sans-serif;
      padding: 30px;
    }
    ul { list-style: none; padding: 0; }
    li {
      margin-bottom: 10px;
      padding: 10px;
      background: #020617;
      border: 1px solid #1f2937;
      border-radius: 6px;
    }
    a {
      color: #22c55e;
      text-decoration: none;
      font-weight: bold;
    }
  </style>
</head>
<body>

<h2>Generated Outputs</h2>

{% if files %}
<ul>
  {% for file in files %}
    <li>
      <a href="/download/{{ folder }}/{{ file }}">{{ file }}</a>
    </li>
  {% endfor %}
</ul>
{% else %}
<p>No outputs found.</p>
{% endif %}

<br>
<a href="/index">⬅ Back to Dashboard</a>

</body>
</html>
