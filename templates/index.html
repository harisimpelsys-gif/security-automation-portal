<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Security Automation Portal</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #1e1e1e;
            color: #fff;
        }

        .container {
            display: flex;
            height: 100vh;
        }

        /* LEFT MENU */
        .sidebar {
            width: 220px;
            background: #0d6efd;
            padding: 15px;
        }

        .sidebar button {
            width: 100%;
            padding: 12px;
            margin-bottom: 8px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            text-align: left;
        }

        .sidebar button.active {
            background: #ffffff;
            color: #0d6efd;
        }

        /* MAIN */
        .main {
            flex: 1;
            padding: 30px;
        }

        .upload-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .upload-box input[type=file] {
            flex: 1;
            padding: 6px;
        }

        .upload-box button {
            background: #0d6efd;
            color: #fff;
            border: none;
            padding: 8px 18px;
            cursor: pointer;
        }

        .btn {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            font-weight: bold;
            border: none;
            cursor: pointer;
        }

        .btn-green {
            background: #198754;
            color: white;
        }

        .btn-yellow {
            background: #ffc107;
            color: black;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid #ffc107;
            color: #ffc107;
        }

        .logs {
            margin-top: 25px;
        }

        .logs button {
            background: #6c757d;
            border: none;
            padding: 10px 18px;
            color: white;
            cursor: pointer;
        }

        .flash {
            background: #dc3545;
            padding: 10px;
            margin-bottom: 10px;
        }

        .success {
            background: #198754;
        }
    </style>
</head>
<body>

<div class="container">

    <!-- LEFT -->
    <div class="sidebar">
        <button class="active">Upload</button>
        <button>Vulnerability</button>
        <button>Misconfiguration</button>
        <button>Logs</button>
    </div>

    <!-- MAIN -->
    <div class="main">

        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for msg in messages %}
              <div class="flash">{{ msg }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <!-- UPLOAD -->
        <form class="upload-box" action="/upload" method="POST" enctype="multipart/form-data">
            <input type="file" name="file" required>
            <button type="submit">Upload</button>
        </form>

        <!-- VULNERABILITY -->
        <button class="btn btn-green" onclick="location.href='/run/vul/devops'">
            Run Vulnerability DevOps
        </button>

        <button class="btn btn-outline" onclick="location.href='/run/vul/master'">
            Run Vulnerability Master
        </button>

        <!-- MISCONFIG -->
        <button class="btn btn-yellow" onclick="location.href='/run/mis/devops'">
            Misconfig DevOps
        </button>

        <button class="btn btn-outline" onclick="location.href='/run/mis/aha'">
            Misconfig AHA Split
        </button>

        <button class="btn btn-outline" onclick="location.href='/run/mis/master'">
            Misconfig Master
        </button>

        <!-- LOGS -->
        <div class="logs">
            <button onclick="location.href='/downloads/vul_devops'">
                Open Logs
            </button>
        </div>

    </div>
</div>

</body>
</html>
