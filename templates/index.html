<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Security Automation Portal</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body{background:#000;color:#e5e7eb}
video{position:fixed;inset:0;z-index:-1;object-fit:cover;filter:brightness(.35);pointer-events:none}
.page{display:none}.page.active{display:block}
</style>
</head>
<body>

<video autoplay muted loop>
  <source src="{{ url_for('static', filename='landing.mp4') }}">
</video>

<div class="container py-4">
<h2>Security Automation Portal</h2>

{% for cat,msg in get_flashed_messages(with_categories=true) %}
<div class="alert alert-{{cat}}">{{msg}}</div>
{% endfor %}

<div class="row">
<div class="col-md-3">
<div class="list-group">
<button class="list-group-item active" data-page="upload">Upload</button>
<button class="list-group-item" data-page="vuln">Vulnerability</button>
<button class="list-group-item" data-page="misconfig">Misconfiguration</button>
<button class="list-group-item" data-page="logs">Logs</button>
</div>
</div>

<div class="col-md-9">

<div id="upload" class="page active">
<form method="post" action="{{ url_for('upload') }}" enctype="multipart/form-data">
<input type="file" name="report_file" class="form-control mb-2" required>
<button class="btn btn-primary">Upload</button>
</form>
</div>

<div id="vuln" class="page">
<form method="post" action="{{ url_for('run_vuln_devops') }}">
<button class="btn btn-success w-100 mb-2">Run DevOps</button>
</form>
<form method="post" action="{{ url_for('run_vuln_master') }}">
<button class="btn btn-outline-success w-100">Run Master</button>
</form>
</div>

<div id="misconfig" class="page">
<form method="post" action="{{ url_for('run_misconfig_devops') }}"><button class="btn btn-warning w-100 mb-2">Stage 1</button></form>
<form method="post" action="{{ url_for('run_misconfig_aha') }}"><button class="btn btn-warning w-100 mb-2">Stage 2</button></form>
<form method="post" action="{{ url_for('run_misconfig_final') }}"><button class="btn btn-warning w-100 mb-2">Stage 3</button></form>
<form method="post" action="{{ url_for('run_misconfig_master') }}"><button class="btn btn-warning w-100">Stage 4</button></form>
</div>

<div id="logs" class="page">
<a class="btn btn-danger" href="{{ url_for('logs_view', which='error') }}" target="_blank">Error Logs</a>
<a class="btn btn-success" href="{{ url_for('logs_view', which='processed') }}" target="_blank">Processed Logs</a>
</div>

</div>
</div>
</div>

<script>
document.querySelectorAll(".list-group-item").forEach(b=>{
b.onclick=()=>{
document.querySelectorAll(".list-group-item").forEach(x=>x.classList.remove("active"));
b.classList.add("active");
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById(b.dataset.page).classList.add("active");
};
});
</script>

</body>
</html>
