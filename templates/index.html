<!DOCTYPE html>
<html>
<head>
    <title>Security Automation Portal</title>
</head>
<body>

<h2>Security Automation Portal</h2>

{% with messages = get_flashed_messages() %}
  {% for msg in messages %}
    <p style="color:green">{{ msg }}</p>
  {% endfor %}
{% endwith %}

<form action="/upload" method="POST" enctype="multipart/form-data">
    <input type="file" name="file" required>
    <button type="submit">Upload</button>
</form>

<hr>

<button onclick="location.href='/run/vul/devops'">
    Run Vulnerability DevOps
</button>

<div id="vul-status" style="margin-top:10px;font-weight:bold;"></div>

<p>
    <a href="/downloads/vul_devops">View Vulnerability Outputs</a>
</p>

<p>
    <a href="/logs/vul/devops" target="_blank">View Vulnerability DevOps Logs</a>
</p>

<p>
    <a href="/logout">Logout</a>
</p>

<script>
function checkStatus() {
    fetch("/status/vul/devops")
        .then(res => res.json())
        .then(data => {
            const el = document.getElementById("vul-status");

            if (data.status === "RUNNING") {
                el.innerText = "⏳ Vulnerability DevOps is processing...";
            } 
            else if (data.status === "COMPLETED") {
                el.innerText = "✅ Vulnerability DevOps completed successfully";
            } 
            else if (data.status === "FAILED") {
                el.innerText = "❌ Vulnerability DevOps failed. Check logs.";
            } 
            else {
                el.innerText = "";
            }
        });
}

setInterval(checkStatus, 4000);
checkStatus();
</script>

</body>
</html>
