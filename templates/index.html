<!DOCTYPE html>
<html>
<head>
  <title>Security Automation Portal</title>
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>

<body class="bg-dark text-light">
<div class="container py-4">

  <h2>Security Automation Portal</h2>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in messages %}
      <div class="alert alert-{{ cat }}">{{ msg }}</div>
    {% endfor %}
  {% endwith %}

  <div class="row mt-3">
    <div class="col-md-3">
      <div class="list-group">
        <a class="list-group-item list-group-item-action active">Upload</a>
        <a class="list-group-item list-group-item-action">Vulnerability</a>
        <a class="list-group-item list-group-item-action">Misconfiguration</a>
        <a class="list-group-item list-group-item-action">Logs</a>
      </div>
    </div>

    <div class="col-md-9">

      <!-- Upload -->
      <form method="post" action="{{ url_for('upload') }}"
            enctype="multipart/form-data" class="mb-3">
        <input type="file" name="report_file" class="form-control mb-2" required>
        <button class="btn btn-primary">Upload</button>
      </form>

      <!-- Vulnerability -->
      <form method="post" action="{{ url_for('run_vuln_devops') }}">
        <button class="btn btn-success w-100 mb-2">
          Run Vulnerability DevOps
        </button>
      </form>

      <form method="post" action="{{ url_for('run_vuln_master') }}">
        <button class="btn btn-outline-success w-100 mb-3">
          Run Vulnerability Master
        </button>
      </form>

      <!-- Misconfiguration -->
      <form method="post" action="{{ url_for('run_misconfig_devops') }}">
        <button class="btn btn-warning w-100 mb-2">
          Misconfig DevOps
        </button>
      </form>

      <form method="post" action="{{ url_for('run_misconfig_aha') }}">
        <button class="btn btn-outline-warning w-100 mb-2">
          Misconfig AHA Split
        </button>
      </form>

      <form method="post" action="{{ url_for('run_misconfig_master') }}">
        <button class="btn btn-outline-warning w-100 mb-3">
          Misconfig Master
        </button>
      </form>

      <!-- Logs -->
      <a class="btn btn-secondary" href="{{ url_for('logs_index') }}" target="_blank">
        Open Logs
      </a>

    </div>
  </div>
</div>
</body>
</html>
