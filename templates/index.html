<!DOCTYPE html>
<html>
<head>
    <title>Security Automation Portal</title>
</head>
<body>

<h2>Security Automation Portal</h2>

{% with messages = get_flashed_messages() %}
  {% if messages %}
    <div style="background:#198754;color:white;padding:10px;margin-bottom:10px">
      {% for msg in messages %}
        {{ msg }}<br>
      {% endfor %}
    </div>
  {% endif %}
{% endwith %}

<form action="/upload" method="POST" enctype="multipart/form-data">
    <input type="file" name="file" required>
    <button type="submit">Upload</button>
</form>

<hr>

<button onclick="location.href='/run/vul/devops'">
    Run Vulnerability DevOps
</button>

<button onclick="location.href='/run/mis/devops'">
    Run Misconfig DevOps
</button>

<hr>

<a href="/downloads/vul_devops">View Vulnerability Outputs</a><br>
<a href="/downloads/mis_devops">View Misconfig Outputs</a><br><br>

<a href="/logout">Logout</a>

</body>
</html>
