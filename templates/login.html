<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
</head>
<body>

<h2>Security Automation Portal</h2>

{% with messages = get_flashed_messages() %}
  {% for msg in messages %}
    <p style="color:red">{{ msg }}</p>
  {% endfor %}
{% endwith %}

<form method="POST">
    <input type="password" name="password" placeholder="Password" required>
    <button type="submit">Login</button>
</form>

</body>
</html>
