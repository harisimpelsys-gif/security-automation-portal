<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login | Security Automation Portal</title>
  <style>
    body {
      background: #0f172a;
      font-family: Arial, sans-serif;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .card {
      background: #111827;
      padding: 30px;
      width: 360px;
      border-radius: 10px;
      box-shadow: 0 0 25px rgba(0,0,0,.6);
    }
    h2 {
      text-align: center;
      margin-bottom: 20px;
    }
    input {
      width: 100%;
      padding: 12px;
      margin-bottom: 15px;
      border-radius: 6px;
      border: none;
      outline: none;
    }
    button {
      width: 100%;
      padding: 12px;
      border-radius: 6px;
      border: none;
      background: #22c55e;
      font-weight: bold;
      cursor: pointer;
    }
    .flash {
      background: #dc2626;
      padding: 10px;
      margin-bottom: 15px;
      border-radius: 6px;
      text-align: center;
    }
  </style>
</head>
<body>

<div class="card">
  <h2>Security Automation Portal</h2>

  {% with messages = get_flashed_messages() %}
    {% if messages %}
      {% for msg in messages %}
        <div class="flash">{{ msg }}</div>
      {% endfor %}
    {% endif %}
  {% endwith %}

  <form method="POST">
    <input type="password" name="password" placeholder="Enter password" required>
    <button type="submit">Login</button>
  </form>
</div>

</body>
</html>
